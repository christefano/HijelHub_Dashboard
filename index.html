<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link id="google-fonts" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.7/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.2.0/chartjs-plugin-zoom.min.js"></script>
<script src="assets/crypto.js"></script>
<script src="assets/app.js"></script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo-default" id="header-logo">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 4L8 2L14 4V10L8 14L2 10V4Z" stroke="white" stroke-width="1.5" fill="none"/><path d="M8 2V14M2 4L14 4M2 10L14 10" stroke="white" stroke-width="0.7" opacity="0.5"/></svg>
    </div>
    <span class="header-title" id="header-title">Traffic Dashboard</span>
  </div>
  <div class="header-right">
    <span class="header-updated" id="header-updated"></span>
    <div class="toggle-wrap" onclick="App.toggleTheme()">
      <div class="theme-toggle"></div>
    </div>
  </div>
</div>

<div class="main" id="dashboard-content">
  <!-- Content injected by app.js -->
</div>

<!-- Footer -->
<footer class="site-footer">
  <span>Copyright &copy; 2026 Hijel</span>
  <span class="footer-sep">|</span>
  <a href="https://www.apache.org/licenses/LICENSE-2.0" target="_blank" rel="noopener">License</a>
  <span class="footer-sep">|</span>
  <a href="https://github.com/HijelHub/HijelHub_Dashboard" target="_blank" rel="noopener">GitHub</a>
  <span class="footer-sep">|</span>
  <a href="#" target="_blank" rel="noopener">Support This Project</a>
</footer>

<!-- Decrypt Modal -->
<div class="modal-overlay hidden" id="decrypt-modal">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="modal-title">Encrypted dashboard</div>
    <div class="modal-desc">Enter your decryption password to view traffic data</div>
    <input type="password" class="modal-input" placeholder="Password" id="decrypt-pw" onkeydown="if(event.key==='Enter')App.handleDecrypt()">
    <div class="modal-error" id="decrypt-err"></div>
    <button class="modal-btn" onclick="App.handleDecrypt()">Decrypt</button>
  </div>
</div>

</body>
</html>
